<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interface de tracé</title>
  <style>
    :root {
      --bg: #f7fafc;
      --surface: #ffffff;
      --border: #d9e2ec;
      --border-strong: #bcccdc;
      --text: #102a43;
      --accent: #1f8db5;
      --danger: #c81e1e;
      --success: #1f9d55;
      --shadow: 0 10px 30px rgba(16, 42, 67, 0.08);
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #f9fbfd 0%, #f1f5f9 100%);
      color: var(--text);
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .graph-container {
      width: min(100%, 1150px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    #info {
      font-size: 1.2rem;
      font-weight: 700;
      line-height: 1.45;
      min-height: 3em;
      max-width: 950px;
      text-align: center;
      margin: 0 auto;
      color: var(--text);
    }

    .canvas-wrap {
      display: flex;
      justify-content: center;
      width: 100%;
      overflow: auto;
      border-radius: 12px;
      background: #fff;
    }

    #canvas {
      display: block;
      background: white;
      border: 1px solid var(--border-strong);
      border-radius: 12px;
      touch-action: none;
      max-width: 100%;
      cursor: crosshair;
    }

    .buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      min-width: 150px;
      min-height: 44px;
      padding: 12px 18px;
      font-size: 1rem;
      font-weight: 600;
      border: 1px solid transparent;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.08s ease, background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    button:active:not(:disabled) {
      transform: translateY(0);
    }

    #reset {
      background: #eef2f6;
      color: var(--text);
      border-color: var(--border);
    }

    #save {
      background: #d9e2ec;
      color: #7b8794;
    }

    #save.ready {
      background: #7b8794;
      color: white;
    }

    #save.saved {
      background: var(--success);
      color: white;
    }

    button:disabled {
      cursor: not-allowed;
      transform: none;
      opacity: 0.95;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 640px) {
      .graph-container {
        padding: 14px;
      }

      #info {
        font-size: 1.08rem;
      }

      button {
        flex: 1 1 180px;
      }
    }
  </style>
</head>
<body>

<div id="task" class="graph-container">
  <div id="info" role="status" aria-live="polite"></div>

  <div class="canvas-wrap">
    <canvas
      id="canvas"
      aria-describedby="canvas-help"
    >
      Zone de tracé interactive. Si le canvas n’est pas pris en charge, cette interface ne peut pas être affichée.
    </canvas>
  </div>

  <p id="canvas-help" class="sr-only">
    Tracez une seule courbe en partant du début de l’intervalle de temps jusqu’à sa fin.
  </p>

  <div class="buttons">
    <button id="reset" type="button">Recommencer</button>
    <button id="save" type="button" disabled>Valider</button>
  </div>
</div>

<script>
(() => {
  "use strict";

  const TEXT = {
    instruction: "Veuillez tracer <b>une seule courbe</b> allant du <b>début jusqu'à la fin</b> de l’intervalle de temps.",
    badStart: "Veuillez commencer au <b><u>début</u></b> de l’intervalle de temps.",
    startRecovered: "Merci ! Maintenant, continuez jusqu’à la fin de l’intervalle.",
    badEnd: "Veuillez tracer jusqu’à la <b><u>fin</u></b> de l’intervalle de temps.",
    ready: "Merci ! Ne pas oublier de <u>valider</u>",
    saved: "Merci ! Votre réponse a été enregistrée."
  };

  const COLORS = {
    normal: "#102a43",
    error: "#c81e1e",
    success: "#1f9d55",
    gridMajor: "#d9e2ec",
    gridMinor: "#edf2f7",
    axis: "#243b53",
    curve: "#000000",
    curveSaved: "#1f9d55",
    marker: "#000000",
    markerSaved: "#1f9d55"
  };

  const CONFIG = {
    nPoints: 50,
    tolerancePx: 6,
    minSampleDx: 1.5
  };

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  const info = document.getElementById("info");
  const saveBtn = document.getElementById("save");
  const resetBtn = document.getElementById("reset");

  const state = {
    xStart: 0,
    xEnd: 0,
    yStart: 0,
    yEnd: 0,
    intervalWidth: 0,
    drawing: false,
    points: [],
    maxXReached: null,
    startedCorrectly: false,
    wasIncorrectStart: false,
    hasValidated: false,
    pointerId: null
  };

  const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

  function setInfo(html, color = COLORS.normal) {
    info.innerHTML = html;
    info.style.color = color;
  }

  function getCssCanvasSize() {
    return {
      width: parseFloat(canvas.style.width),
      height: parseFloat(canvas.style.height)
    };
  }

  function yToScore(y) {
    const ratio = (state.yEnd - y) / (state.yEnd - state.yStart);
    return Number((ratio * 5).toFixed(2));
  }

  function getPointerPos(evt) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: clamp(evt.clientX - rect.left, state.xStart, state.xEnd),
      y: clamp(evt.clientY - rect.top, state.yStart, state.yEnd)
    };
  }

  function currentCurveColor() {
    return state.hasValidated ? COLORS.curveSaved : COLORS.curve;
  }

  function currentMarkerColor() {
    return state.hasValidated ? COLORS.markerSaved : COLORS.marker;
  }

  setInfo(TEXT.instruction);
  resizeCanvas();

  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;
    const width = Math.min(window.innerWidth * 0.92, 1080);
    const height = Math.min(window.innerHeight * 0.68, 620);

    canvas.style.width = `${width}px`;
    canvas.style.height = `${height}px`;
    canvas.width = Math.round(width * dpr);
    canvas.height = Math.round(height * dpr);

    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(dpr, dpr);

    computeLayout();
    redraw();
  }

  function computeLayout() {
    const { width: w, height: h } = getCssCanvasSize();

    state.xStart = w * 0.07;
    state.xEnd = w * 0.93;
    state.yStart = h * 0.06;
    state.yEnd = h * 0.88;
    state.intervalWidth = (state.xEnd - state.xStart) / CONFIG.nPoints;
  }

  function redraw() {
    drawGrid();
    drawSmoothCurve(state.points);
    drawCurrentPoint(state.points);
  }
  function drawGrid() {
  const { width: w, height: h } = getCssCanvasSize();
  const stepY = (state.yEnd - state.yStart) / 5;
  const tickLength = 6;

  ctx.clearRect(0, 0, w, h);

  // Lignes horizontales
  for (let i = 0; i <= 5; i++) {
    const y = state.yEnd - i * stepY;
    ctx.beginPath();
    ctx.strokeStyle = COLORS.gridMajor;
    ctx.lineWidth = 1;
    ctx.moveTo(state.xStart, y);
    ctx.lineTo(state.xEnd, y);
    ctx.stroke();
  }

  // Lignes verticales correspondant aux 50 points
  for (let i = 0; i <= CONFIG.nPoints; i++) {
    const x = state.xStart + i * state.intervalWidth;
    ctx.beginPath();
    ctx.strokeStyle = (i % 5 === 0) ? COLORS.gridMajor : COLORS.gridMinor;
    ctx.lineWidth = (i % 5 === 0) ? 1 : 0.8;
    ctx.moveTo(x, state.yStart);
    ctx.lineTo(x, state.yEnd);
    ctx.stroke();
  }

  // Axes
  ctx.strokeStyle = COLORS.axis;
  ctx.fillStyle = COLORS.axis;
  ctx.lineWidth = 2;

  ctx.beginPath();
  ctx.moveTo(state.xStart, state.yEnd);
  ctx.lineTo(state.xEnd, state.yEnd);
  ctx.moveTo(state.xStart, state.yEnd);
  ctx.lineTo(state.xStart, state.yStart);
  ctx.stroke();

  // Flèche axe X
  ctx.beginPath();
  ctx.moveTo(state.xEnd, state.yEnd);
  ctx.lineTo(state.xEnd - 10, state.yEnd - 5);
  ctx.lineTo(state.xEnd - 10, state.yEnd + 5);
  ctx.closePath();
  ctx.fill();

  // Flèche axe Y
  ctx.beginPath();
  ctx.moveTo(state.xStart, state.yStart);
  ctx.lineTo(state.xStart - 5, state.yStart + 10);
  ctx.lineTo(state.xStart + 5, state.yStart + 10);
  ctx.closePath();
  ctx.fill();

  // Petits traits sur l’axe du temps
  for (let i = 0; i <= CONFIG.nPoints; i++) {
    const x = state.xStart + i * state.intervalWidth;
    ctx.beginPath();
    ctx.strokeStyle = COLORS.axis;
    ctx.lineWidth = (i % 5 === 0) ? 1.4 : 1;
    ctx.moveTo(x, state.yEnd);
    ctx.lineTo(x, state.yEnd + ((i % 5 === 0) ? 8 : 5));
    ctx.stroke();
  }

  // Labels axes
  ctx.fillStyle = COLORS.axis;

  // "Maintenant" sous l’extrémité droite de l’axe X
  ctx.font = "bold 15px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "top";
  ctx.fillText("Maintenant", state.xEnd, state.yEnd + 12);
  
  // "Temps (min)" centré sous l’axe X, un peu plus bas
  ctx.font = "bold 18px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "top";
  ctx.fillText("Temps (min)", (state.xStart + state.xEnd) / 2, state.yEnd + 34);
  
  // Axe Y
  ctx.save();
  ctx.translate(40, h / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.font = "bold 18px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("Intensité", 0, 0);
  ctx.restore();
  
  // Remise à zéro des alignements
  ctx.textAlign = "start";
  ctx.textBaseline = "alphabetic";
    
  // Chiffres Y rapprochés de l’axe
  ctx.font = "15px Arial";
  for (let i = 0; i <= 5; i++) {
    const y = state.yEnd - i * stepY;
    ctx.fillText(i.toString(), state.xStart - 18, y + 5);
  }
}

  function drawSmoothCurve(points) {
    if (points.length < 2) return;

    ctx.strokeStyle = currentCurveColor();
    ctx.lineWidth = 3;
    ctx.lineJoin = "round";
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);

    for (let i = 1; i < points.length - 1; i++) {
      const xc = (points[i].x + points[i + 1].x) / 2;
      const yc = (points[i].y + points[i + 1].y) / 2;
      ctx.quadraticCurveTo(points[i].x, points[i].y, xc, yc);
    }

    const last = points[points.length - 1];
    ctx.lineTo(last.x, last.y);
    ctx.stroke();
  }

  function drawCurrentPoint(points) {
    if (!points.length) return;

    const last = points[points.length - 1];
    ctx.beginPath();
    ctx.fillStyle = currentMarkerColor();
    ctx.arc(last.x, last.y, 4, 0, Math.PI * 2);
    ctx.fill();
  }

  function canAcceptPoint(x) {
    if (state.maxXReached === null) return true;
    return x >= state.maxXReached;
  }

  function addPoint(x, y) {
    const last = state.points[state.points.length - 1];
    if (last && Math.abs(x - last.x) < CONFIG.minSampleDx) return;

    state.maxXReached = x;
    state.points.push({ x, y });
  }

  function handleStartConstraint(x) {
    if (state.startedCorrectly || state.points.length > 0) return true;

    if (x > state.xStart + CONFIG.tolerancePx) {
      setInfo(TEXT.badStart, COLORS.error);
      state.wasIncorrectStart = true;
      return false;
    }

    state.startedCorrectly = true;
    setInfo(state.wasIncorrectStart ? TEXT.startRecovered : TEXT.instruction, COLORS.normal);
    return true;
  }

  function handleCompletion(x) {
    if (x >= state.xEnd - CONFIG.tolerancePx) {
      saveBtn.disabled = false;
      saveBtn.classList.add("ready");
      setInfo(TEXT.ready, COLORS.success);
    }
  }

  function resetTask() {
    if (state.hasValidated) return;

    state.drawing = false;
    state.points = [];
    state.maxXReached = null;
    state.startedCorrectly = false;
    state.wasIncorrectStart = false;
    state.pointerId = null;

    saveBtn.disabled = true;
    saveBtn.classList.remove("ready", "saved");
    resetBtn.disabled = false;
    canvas.style.pointerEvents = "auto";

    setInfo(TEXT.instruction, COLORS.normal);
    redraw();
  }

  function buildScores() {
    const rawScores = [];

    for (let i = 0; i < CONFIG.nPoints; i++) {
      const xmin = state.xStart + i * state.intervalWidth;
      const xmax = (i === CONFIG.nPoints - 1) ? state.xEnd + 0.001 : xmin + state.intervalWidth;

      let sum = 0;
      let count = 0;

      for (const p of state.points) {
        if (p.x >= xmin && p.x < xmax) {
          sum += p.y;
          count++;
        }
      }

      rawScores.push(count > 0 ? yToScore(sum / count) : null);
    }

    const scores = [...rawScores];

    const firstKnown = scores.findIndex(v => v !== null);
    if (firstKnown > 0) {
      for (let i = 0; i < firstKnown; i++) scores[i] = scores[firstKnown];
    }

    let lastKnown = -1;
    for (let i = scores.length - 1; i >= 0; i--) {
      if (scores[i] !== null) {
        lastKnown = i;
        break;
      }
    }

    if (lastKnown >= 0 && lastKnown < scores.length - 1) {
      for (let i = lastKnown + 1; i < scores.length; i++) {
        scores[i] = scores[lastKnown];
      }
    }

    let i = 0;
    while (i < scores.length) {
      if (scores[i] !== null) {
        i++;
        continue;
      }

      const start = i - 1;
      let j = i;
      while (j < scores.length && scores[j] === null) j++;
      const end = j;

      if (start >= 0 && end < scores.length && scores[start] !== null && scores[end] !== null) {
        const gap = end - start;
        for (let k = 1; k < gap; k++) {
          const t = k / gap;
          scores[start + k] = Number(
            (scores[start] + t * (scores[end] - scores[start])).toFixed(2)
          );
        }
      }

      i = j;
    }

    return scores.map(v => v === null ? 0 : Number(v.toFixed(2)));
  }

  function validateAndSend() {
    if (state.hasValidated) return;

    const scores = buildScores();

    window.parent.postMessage(
      {
        type: "graphData",
        payload: { points: scores }
      },
      "*"
    );

    state.hasValidated = true;
    saveBtn.disabled = false;
    saveBtn.classList.remove("ready");
    saveBtn.classList.add("saved");
    resetBtn.disabled = true;
    canvas.style.pointerEvents = "none";

    setInfo(TEXT.saved, COLORS.success);
    redraw();
  }

  canvas.addEventListener("pointerdown", (evt) => {
    if (state.hasValidated) return;

    state.drawing = true;
    state.pointerId = evt.pointerId;
    canvas.setPointerCapture(evt.pointerId);

    const { x, y } = getPointerPos(evt);

    if (!handleStartConstraint(x)) return;
    if (!canAcceptPoint(x)) return;

    addPoint(x, y);
    redraw();
    handleCompletion(x);
  });

  canvas.addEventListener("pointermove", (evt) => {
    if (!state.drawing || state.hasValidated) return;
    if (state.pointerId !== evt.pointerId) return;

    const { x, y } = getPointerPos(evt);

    if (!handleStartConstraint(x)) return;
    if (!canAcceptPoint(x)) return;

    addPoint(x, y);
    redraw();
    handleCompletion(x);
  });

  function stopDrawing(evt) {
    if (state.pointerId !== null && evt.pointerId === state.pointerId) {
      try {
        canvas.releasePointerCapture(evt.pointerId);
      } catch (_) {}
    }

    state.drawing = false;
    state.pointerId = null;

    if (
      state.startedCorrectly &&
      state.maxXReached !== null &&
      state.maxXReached < state.xEnd - CONFIG.tolerancePx &&
      !state.hasValidated
    ) {
      setInfo(TEXT.badEnd, COLORS.error);
    }
  }

  canvas.addEventListener("pointerup", stopDrawing);
  canvas.addEventListener("pointercancel", stopDrawing);
  canvas.addEventListener("pointerleave", () => {
    state.drawing = false;
  });

  resetBtn.addEventListener("click", resetTask);
  saveBtn.addEventListener("click", validateAndSend);
  window.addEventListener("resize", resizeCanvas);
})();
</script>

</body>
</html>
